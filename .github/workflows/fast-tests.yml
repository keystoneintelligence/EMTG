name: Fast Tests

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  fast-tests:
    name: Python and CTest smoke
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy pandas

      - name: Run Python tests
        shell: pwsh
        run: python -m pytest

      - name: Configure fast CTest targets
        shell: pwsh
        run: >
          cmake -S . -B _local/builds/ci-fast
          -G "Visual Studio 17 2022" -A x64
          -DBUILD_EMTG_TESTBED=ON
          -DRUN_ADOUBLE_TESTBED=ON
          -DRUN_MISSIONOPTIONS_TESTBED=ON
          -DRUN_MISSION_TESTBED=OFF
          -DRUN_ACCELERATION_MODEL_TESTBED=OFF
          -DUSE_AD_INSTRUMENTATION=OFF

      - name: Build fast CTest targets
        shell: pwsh
        run: cmake --build _local/builds/ci-fast --config Release --target adouble_tests missionoptions_testbed

      - name: Run CTest smoke targets
        shell: pwsh
        run: ctest --test-dir _local/builds/ci-fast -C Release --output-on-failure
