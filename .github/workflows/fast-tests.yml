name: Fast Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy pandas

      - name: Run Python tests
        run: python -m pytest

  cxx-adouble:
    name: C++ adouble smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build adouble smoke test
        run: |
          mkdir -p _local/builds/github-adouble
          g++ -std=c++17 -DAD_INSTRUMENTATION \
            -Isrc/Core -Isrc/Math \
            src/Testing/adouble_tests/adouble_tests.cpp \
            src/Math/EMTG_Matrix.cpp \
            -o _local/builds/github-adouble/adouble_tests

      - name: Run adouble smoke test
        run: ./_local/builds/github-adouble/adouble_tests
