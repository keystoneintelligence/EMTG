name: Build Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Build, test, audit, and package
        shell: pwsh
        run: .\build.ps1
      - name: Verify build did not modify tracked sources
        run: git diff --exit-code
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*

  linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Build, test, and package experimental Linux artifacts
        run: bash ./build.sh --bootstrap
      - name: Verify build did not modify tracked sources
        run: git diff --exit-code
      - uses: actions/upload-artifact@v4
        with:
          name: linux-experimental
          path: dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify release tag matches VERSION
        shell: bash
        run: |
          expected="$(tr -d '[:space:]' < VERSION)"
          actual="${GITHUB_REF_NAME#v}"
          test "$actual" = "$expected" || {
            echo "Release tag $GITHUB_REF_NAME does not match VERSION ($expected)" >&2
            exit 1
          }
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --generate-notes --verify-tag
