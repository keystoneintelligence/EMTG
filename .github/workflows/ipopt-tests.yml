name: IPOPT Open-Source Solver

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  linux-ipopt-only:
    name: Linux IPOPT-only build and analytic regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CSPICE_ROOT: ${{ github.workspace }}/_local/cspice-linux/cspice
      IPOPT_PREFIX: ${{ github.workspace }}/_local/ipopt-3.14.19
      IPOPT_SOURCE: ${{ github.workspace }}/_local/ipopt-source-3.14.19

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install open-source build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gfortran \
            libboost-filesystem-dev \
            libboost-serialization-dev \
            libboost-system-dev \
            libgsl-dev \
            liblapack-dev \
            libmetis-dev \
            libmumps-seq-dev \
            ninja-build \
            pkg-config \
            tcsh

      - name: Build IPOPT 3.14.19 with the system MUMPS solver
        run: |
          mkdir -p _local "$IPOPT_SOURCE" "$IPOPT_PREFIX" "${IPOPT_SOURCE}-build"
          curl --fail --location --retry 3 --retry-all-errors \
            --output _local/Ipopt-3.14.19.tar.gz \
            https://github.com/coin-or/Ipopt/archive/refs/tags/releases/3.14.19.tar.gz
          echo "b3eb84a23812b53a3325bcd2c599de2b0f5df45a18ed251f9e3c1cd893136287  _local/Ipopt-3.14.19.tar.gz" \
            | sha256sum --check -
          tar --extract --gzip --strip-components=1 \
            --file=_local/Ipopt-3.14.19.tar.gz --directory="$IPOPT_SOURCE"
          cd "${IPOPT_SOURCE}-build"
          "$IPOPT_SOURCE/configure" \
            --prefix="$IPOPT_PREFIX" \
            --disable-java \
            --disable-sipopt \
            --with-mumps-cflags="-I/usr/include/mumps_seq" \
            --with-mumps-lflags="-ldmumps_seq"
          make --jobs=2
          make install
          PKG_CONFIG_PATH="$IPOPT_PREFIX/lib/pkgconfig" pkg-config --modversion ipopt

      - name: Download and build the official Linux CSPICE toolkit
        run: |
          mkdir -p "$(dirname "$CSPICE_ROOT")"
          curl --fail --location --retry 3 --retry-all-errors \
            --output "$(dirname "$CSPICE_ROOT")/cspice.tar.Z" \
            https://naif.jpl.nasa.gov/pub/naif/toolkit/C/PC_Linux_GCC_64bit/packages/cspice.tar.Z
          echo "60a95b51a6472f1afe7e40d77ebdee43c12bb5b8823676ccc74692ddfede06ce  $(dirname "$CSPICE_ROOT")/cspice.tar.Z" \
            | sha256sum --check -
          gzip --decompress --stdout "$(dirname "$CSPICE_ROOT")/cspice.tar.Z" \
            | tar --extract --file=- --directory="$(dirname "$CSPICE_ROOT")"
          find "$CSPICE_ROOT" -type f -name '*.csh' -exec chmod +x {} +
          cd "$CSPICE_ROOT"
          ./makeall.csh
          test -f "$CSPICE_ROOT/lib/cspice.a"

      - name: Configure IPOPT-only EMTG
        run: |
          export PKG_CONFIG_PATH="$IPOPT_PREFIX/lib/pkgconfig"
          cmake --preset ipopt-only \
            -DCSPICE_DIR="$CSPICE_ROOT" \
            -DIPOPT_ROOT_DIR="$IPOPT_PREFIX"

      - name: Build full executable and analytic IPOPT tests
        run: cmake --build --preset ipopt-only --target EMTGv9 ipopt_interface_tests --parallel 2

      - name: Run IPOPT interface regression
        run: ctest --preset ipopt-only -R ipopt
